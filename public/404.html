<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PGHub</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting...</body>
</html>
